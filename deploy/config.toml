# /etc/selfupdate/config.toml — one operator config for the whole update tower.
# The bootstrap receives its state directory, initial supervisor path, and this
# supervisor config as command-line arguments. The installer seeds install_root
# with a verified initial bundle before starting the service.

[routing]
root       = "/etc/selfupdate/routing-root.json" # installer-pinned routing trust anchor
base_url   = "https://updates.example.com/routing/" # the node's only configured repository URL
assignment = "assignments/nodes/node-123.json"
transport_timeout = "30s" # overall metadata refresh and per-target progress deadline

[repository]
root         = "/etc/selfupdate/releases-root.json" # pinned release trust anchor (read-only)
# datastore defaults to <install_root>/state/tuf
metadata_limit = 1048576       # maximum bytes for one metadata document
target_limit   = 536870912     # maximum compressed target bytes
transport_timeout = "30s"      # tune lower for a fast, local repository

[application]
product         = "app"
channel         = "stable"
install_root    = "/var/lib/selfupdate/app"
args            = ["--addr", "127.0.0.1:9090"]
health_url      = "http://127.0.0.1:9090/healthz"   # omit for liveness-only
# Authenticated application target versions below the installed version are denied.
# Activation defaults to portable stop/activate/start. A Unix HAProxy-like service can
# opt into reexec by adding the following table. Commands are argv arrays, not shell text:
# [application.activation]
# mode = "reexec"

# Retain a bounded number of inactive immutable objects. Active releases, rollback
# predecessors, executing providers, and the running supervisor are always protected.
[storage]
inactive_releases          = 2
inactive_providers         = 2
inactive_supervisors       = 1
inactive_repository_caches = 2
inactive_bytes             = 1073741824

# All optional; defaults shown. Durations accept "15s", "5m", "2h", or bare seconds.
[timeouts]
check_interval      = "60s"   # how often to check for an application update
health_grace        = "10s"   # time to become healthy; raise for a slow-starting app
                              #   (minutes is fine — a crash is still detected instantly)
health_successes    = 1       # consecutive good health answers required to trust a version
                              #   (a readiness successThreshold); raise to confirm sustained health
health_interval     = "1s"    # spacing between those confirmation probes (ignored when successes = 1)
retry_after         = "5m"    # how often a health-failed release is retried (not blocked forever)
refresh_retry       = "5s"    # retry delay after a repository refresh failure
confirmation_window = "2m"   # a crash before this elapses reverts the committed update
supervisor_check_interval = "1h" # how often to check for a supervisor release
