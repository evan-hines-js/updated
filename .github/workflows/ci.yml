name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan dependencies, secrets, and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel is Intel; macos-14 is a native Apple Silicon runner. Keeping
        # both makes the advertised x86-64/aarch64 support part of CI rather than
        # relying only on cross-compilation.
        include:
          - os: ubuntu-latest
            release: linux-x86_64
          - os: macos-15-intel
            release: macos-x86_64
          - os: macos-14
            release: macos-aarch64
          - os: windows-latest
            release: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      # aws-lc-rs (via the `tough` TUF client) builds its C with CMake on every
      # OS — preinstalled on the runners — plus NASM on Windows MSVC, which is not.
      - if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      # Compile and run the test artifacts first. Clippy then reuses Cargo's
      # dependency artifacts and analyzes only this workspace's code.
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets --no-deps -- -D warnings
      # Portable updater scenarios run identically on every OS.
      - run: cargo run -p e2e

      # A main build produces the continuously-running update tower for each desktop
      # target. The optional updated-oneshot companion remains independently buildable
      # but is not part of this supervisor/application deployment bundle.
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          cargo build --release -p bootstrap -p supervisor
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo build --release -p windows-service
          fi
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/updated-${{ matrix.release }}.tar.gz" \
            bootstrap supervisor
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $files = @(
            "target/release/bootstrap.exe"
            "target/release/supervisor.exe"
            "target/release/selfupdate-service.exe"
          )
          Compress-Archive -Path $files -DestinationPath "dist/updated-${{ matrix.release }}.zip"
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: updated-${{ matrix.release }}
          path: dist/*
          if-no-files-found: error

  windows-scm-e2e:
    name: Windows Service Control Manager E2E
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # aws-lc-rs requires NASM when building for Windows MSVC.
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Exercise native service registration, durable bootstrap state, clean
      # application shutdown, and relaunch after an SCM service restart.
      - name: Exercise the native SCM lifecycle
        shell: powershell
        run: .\deploy\windows\test-scm-e2e.ps1

  macos-publish-fuzz:
    name: macOS concurrent publish fuzz (${{ matrix.mode }})
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mode: [restart, reexec]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Start production-shaped update tower
        env:
          UPDATED_SMOKE_CHECK_INTERVAL: 1s
          UPDATED_SMOKE_HEALTH_GRACE: 2s
          UPDATED_SMOKE_CONFIRMATION_WINDOW: 2s
          UPDATED_SMOKE_STOP_GRACE_SECONDS: 1
          UPDATED_SMOKE_LAUNCHD_THROTTLE_SECONDS: 1
        run: ./scripts/macos-smoke.sh start "${{ matrix.mode }}"
      - name: Fuzz concurrent version publication and convergence
        run: ./scripts/macos-publish-fuzz.sh
      - name: Preserve failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-publish-fuzz-${{ matrix.mode }}-logs
          path: |
            target/macos-smoke/*.log
            target/macos-smoke/publish-fuzz-results/
          if-no-files-found: warn
      - name: Stop update tower and remove smoke state
        if: always()
        run: ./scripts/macos-smoke.sh reset

  linux-haproxy-e2e:
    name: Linux real HAProxy binary reload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install HAProxy test dependencies
        run: sudo apt-get update && sudo apt-get install -y haproxy
      - name: Exercise real master-worker binary upgrades
        run: ./scripts/linux-haproxy-e2e.sh
      - name: Preserve failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-haproxy-e2e-logs
          path: target/haproxy-e2e/*.log
          if-no-files-found: warn

  release:
    name: Publish immutable release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, trivy, windows-scm-e2e, macos-publish-fuzz, linux-haproxy-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # `gh release` resolves the repository from the checkout. Artifact-only jobs have
      # no Git context and fail with "not a git repository" before uploading anything.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: updated-*
          path: dist
          merge-multiple: true
      - name: Verify all platform packages were downloaded
        shell: bash
        run: |
          packages=(
            dist/updated-linux-x86_64.tar.gz
            dist/updated-macos-x86_64.tar.gz
            dist/updated-macos-aarch64.tar.gz
            dist/updated-windows-x86_64.zip
          )
          for package in "${packages[@]}"; do
            test -s "$package" || {
              echo "Missing or empty release package: $package" >&2
              exit 1
            }
          done
      - name: Generate release checksums
        working-directory: dist
        run: sha256sum updated-* > SHA256SUMS
      - name: Attest release packages and checksums
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/updated-*
            dist/SHA256SUMS
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          packages=(
            dist/updated-linux-x86_64.tar.gz
            dist/updated-macos-x86_64.tar.gz
            dist/updated-macos-aarch64.tar.gz
            dist/updated-windows-x86_64.zip
            dist/SHA256SUMS
          )
          release_tag="build-$GITHUB_SHA"
          gh release create "$release_tag" "${packages[@]}" \
            --target "$GITHUB_SHA" \
            --title "Verified build $GITHUB_SHA" \
            --notes "Immutable, attested build of main at $GITHUB_SHA."
          release_assets="$(gh release view "$release_tag" --json assets --jq '.assets[].name')"
          for package in "${packages[@]}"; do
            name="${package##*/}"
            grep -Fxq "$name" <<<"$release_assets" || {
              echo "Release is missing uploaded package: $name" >&2
              exit 1
            }
          done
